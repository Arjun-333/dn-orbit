version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nextjs-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/client"
      ui-stack:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"