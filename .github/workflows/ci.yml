name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install
      - run: bunx prisma generate
      - run: bun run lint
      - run: bunx tsc --noEmit
